name: lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  taskfile-validate:
    name: taskfile syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Taskfile.yml + each tasks/*.yml
        run: |
          set -euo pipefail
          task --list-all
          for f in tasks/*.yml; do
            echo "::group::task --list -t $f"
            task --list -t "$f"
            echo "::endgroup::"
          done

  yaml-lint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install --quiet yamllint
      - name: Run yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable, truthy: disable}}" \
            Taskfile.yml tasks/ .github/workflows/

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find shell scripts
        run: |
          shells=$(find . -type f \( -name '*.sh' -o -name '*.bash' \) \
            -not -path './.git/*' || true)
          if [ -z "$shells" ]; then
            echo "No shell scripts to lint."
            exit 0
          fi
          echo "$shells" | xargs -r shellcheck
