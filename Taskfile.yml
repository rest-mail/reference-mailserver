version: "3"
silent: true

# reference-mailserver Taskfile (per-service orchestrator).
#
# Each `CONFIG=<name>` invocation maps to:
#   - CONFIG_DIR=./configs/<name>
#   - PROJECT=mailref-<name>
# so that running `task up CONFIG=mail1` and `task up CONFIG=mail2` produces
# two completely independent stacks on the same mailnet network.
#
# This file composes the per-service Taskfiles in ./tasks/*.yml under their
# `<svc>:` namespace. Per-instance vars (HOSTNAME, IPs) default to the mail1
# values; the parent rest-mail Taskfile (or a CLI override) supplies mail2
# values via include vars. Instances are launched one at a time — each
# invocation drives a single CONFIG; the user decides how many to run.
#
# DNS is registered with the testbed's dnsmasq via the
# reference-dnsmasq image's `render-fragment` subcommand — the image owns
# the rendering logic, the consumer just supplies its dns.env.

vars:
  CONFIG: '{{.CONFIG | default "mail1"}}'
  # NOTE: there are deliberately NO derived PROJECT/CONFIG_DIR globals. A
  # global defined in terms of another var (PROJECT: mailref-<CONFIG>) compiles
  # against CONFIG's DEFAULT, not a CLI-supplied CONFIG=<name> — so
  # `task up CONFIG=mail2` silently drove project mailref-mail1 and hijacked
  # mail1's containers with mail2's config. Every use site now inlines the
  # mailref-<CONFIG> / ./configs/<CONFIG> templates, which DO see the CLI value.
  HOSTNAME: '{{.HOSTNAME | default "mail1.test"}}'
  # NOTE: HOSTNAME default is a fallback; for mail2 the parent override or
  # CLI override must set HOSTNAME=mail2.test. The dns.env in each config dir
  # is the source of truth at the dns:register stage.

  MAILNET_NAME: '{{.MAILNET_NAME | default "testbed_mailnet"}}'
  CERTS_VOLUME: '{{.CERTS_VOLUME | default "testbed_certs"}}'
  DNSMASQ_FRAGMENTS_VOLUME: '{{.DNSMASQ_FRAGMENTS_VOLUME | default "testbed_dnsmasq_fragments"}}'
  DNSMASQ_CONTAINER: '{{.DNSMASQ_CONTAINER | default "testbed-dnsmasq"}}'
  DNSMASQ_IMAGE: '{{.DNSMASQ_IMAGE | default "ghcr.io/rest-mail/reference-dnsmasq"}}'
  IMAGE_TAG: '{{.IMAGE_TAG | default "2026.04.28"}}'

  # Per-instance IPs — mail1 defaults from configs/mail1/dns.env. The parent
  # Taskfile (rest-mail) overrides these for mail2 via include vars.
  POSTGRES_IP: '{{.POSTGRES_IP | default "10.99.0.41"}}'
  POSTFIX_IP: '{{.POSTFIX_IP | default "10.99.0.11"}}'
  DOVECOT_IP: '{{.DOVECOT_IP | default "10.99.0.111"}}'
  # NOT .13: that collides with restmail.test's SMTP gateway (the ex-mail3
  # low block uses .13/.15/.16), and the reference instances must coexist
  # with it on the same mailnet. configs/mail1/env pins the milter endpoint
  # to this address — keep them in sync.
  RSPAMD_IP: '{{.RSPAMD_IP | default "10.99.0.17"}}'
  FAIL2BAN_IP: '{{.FAIL2BAN_IP | default "10.99.0.14"}}'

  # Per-service images. These MUST be uniquely named and passed explicitly to
  # each include below (see IMAGE: lines). Every tasks/*.yml declares a var
  # named `IMAGE`; Task flattens all included taskfiles' vars into one shared
  # namespace, so a bare `IMAGE` collides across the five services and one
  # image wins for all of them. Binding IMAGE per include (like IP) pins each
  # service to its own image. IMAGE_TAG is appended by the postfix/dovecot/
  # rspamd/fail2ban tasks; the postgres task uses IMAGE verbatim.
  POSTGRES_IMAGE: '{{.POSTGRES_IMAGE | default "postgres:16-alpine"}}'
  POSTFIX_IMAGE: '{{.POSTFIX_IMAGE | default "ghcr.io/rest-mail/reference-postfix"}}'
  DOVECOT_IMAGE: '{{.DOVECOT_IMAGE | default "ghcr.io/rest-mail/reference-dovecot"}}'
  RSPAMD_IMAGE: '{{.RSPAMD_IMAGE | default "ghcr.io/rest-mail/reference-rspamd"}}'
  FAIL2BAN_IMAGE: '{{.FAIL2BAN_IMAGE | default "ghcr.io/rest-mail/reference-fail2ban"}}'

  # Per-service image tags. Most images share IMAGE_TAG, but reference-postfix
  # is pinned ahead: its DB-driven virtual maps + env-gated transport/sasl/milter
  # (required for actual delivery) shipped in a newer calver than the others.
  # Override per service so the rest stay on IMAGE_TAG until they roll forward.
  POSTFIX_IMAGE_TAG: '{{.POSTFIX_IMAGE_TAG | default "2026.07.22"}}'

includes:
  postgres:
    taskfile: ./tasks/postgres.yml
    vars:
      PROJECT: 'mailref-{{.CONFIG}}'
      NETWORK: '{{.MAILNET_NAME}}'
      IP: '{{.POSTGRES_IP}}'
      CONFIG_DIR: './configs/{{.CONFIG}}'
      IMAGE: '{{.POSTGRES_IMAGE}}'

  postfix:
    taskfile: ./tasks/postfix.yml
    vars:
      PROJECT: 'mailref-{{.CONFIG}}'
      NETWORK: '{{.MAILNET_NAME}}'
      CERTS_VOLUME: '{{.CERTS_VOLUME}}'
      IP: '{{.POSTFIX_IP}}'
      HOSTNAME: '{{.HOSTNAME}}'
      CONFIG_DIR: './configs/{{.CONFIG}}'
      IMAGE: '{{.POSTFIX_IMAGE}}'
      IMAGE_TAG: '{{.POSTFIX_IMAGE_TAG}}'

  dovecot:
    taskfile: ./tasks/dovecot.yml
    vars:
      PROJECT: 'mailref-{{.CONFIG}}'
      NETWORK: '{{.MAILNET_NAME}}'
      CERTS_VOLUME: '{{.CERTS_VOLUME}}'
      IP: '{{.DOVECOT_IP}}'
      HOSTNAME: '{{.HOSTNAME}}'
      CONFIG_DIR: './configs/{{.CONFIG}}'
      IMAGE: '{{.DOVECOT_IMAGE}}'
      IMAGE_TAG: '{{.IMAGE_TAG}}'

  rspamd:
    taskfile: ./tasks/rspamd.yml
    vars:
      PROJECT: 'mailref-{{.CONFIG}}'
      NETWORK: '{{.MAILNET_NAME}}'
      IP: '{{.RSPAMD_IP}}'
      CONFIG_DIR: './configs/{{.CONFIG}}'
      IMAGE: '{{.RSPAMD_IMAGE}}'
      IMAGE_TAG: '{{.IMAGE_TAG}}'

  fail2ban:
    taskfile: ./tasks/fail2ban.yml
    vars:
      PROJECT: 'mailref-{{.CONFIG}}'
      NETWORK: '{{.MAILNET_NAME}}'
      IP: '{{.FAIL2BAN_IP}}'
      CONFIG_DIR: './configs/{{.CONFIG}}'
      IMAGE: '{{.FAIL2BAN_IMAGE}}'
      IMAGE_TAG: '{{.IMAGE_TAG}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  up:
    desc: Bring up one mail server (CONFIG=mail1|mail2|...)
    cmds:
      - task: dns:register
      - task: postgres:up
      - |
        echo "  waiting for postgres to become healthy..."
        for i in $(seq 1 30); do
          status=$(docker inspect -f '{{`{{.State.Health.Status}}`}}' mailref-{{.CONFIG}}-postgres 2>/dev/null || echo "starting")
          if [ "$status" = "healthy" ]; then
            echo "  postgres healthy"
            break
          fi
          sleep 1
        done
      - task: postfix:up
      - task: dovecot:up
      - task: rspamd:up
      - task: fail2ban:up
      - |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  reference-mailserver ({{.HOSTNAME}}) ready"
        echo "  project: mailref-{{.CONFIG}}"
        echo ""
        echo "  task ps CONFIG={{.CONFIG}}                list containers"
        echo "  task <svc>:logs CONFIG={{.CONFIG}}        tail one service's logs"
        echo "    (svc = postgres|postfix|dovecot|rspamd|fail2ban)"
        echo "  task down CONFIG={{.CONFIG}}              stop (preserves volumes)"
        echo "  task destroy CONFIG={{.CONFIG}}           stop + drop volumes"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  down:
    desc: Tear down one mail server (CONFIG=mail1|mail2|...) — preserves volumes
    cmds:
      - task: fail2ban:down
      - task: rspamd:down
      - task: dovecot:down
      - task: postfix:down
      - task: postgres:down
      - task: dns:unregister

  destroy:
    desc: Tear down one mail server and remove its volumes (CONFIG=mail1|mail2|...)
    cmds:
      - task: down
      - |
        for vol in "mailref-{{.CONFIG}}-postgres-data" "mailref-{{.CONFIG}}-maildir"; do
          if docker volume inspect "$vol" >/dev/null 2>&1; then
            echo "  removing volume $vol"
            docker volume rm -f "$vol" >/dev/null
          fi
        done

  dns:register:
    desc: Render this instance's dnsmasq fragment + reload (without bringing up containers)
    cmds:
      - |
        docker run --rm \
          -v "{{.DNSMASQ_FRAGMENTS_VOLUME}}:/dst" \
          -v "$(pwd)/./configs/{{.CONFIG}}/dns.env:/env:ro" \
          {{.DNSMASQ_IMAGE}}:{{.IMAGE_TAG}} \
          render-fragment --name {{.CONFIG}} --project mailref-{{.CONFIG}}
      - |
        if docker ps -aq --filter "name=^/{{.DNSMASQ_CONTAINER}}$" | grep -q .; then
          docker restart {{.DNSMASQ_CONTAINER}} >/dev/null
        fi

  dns:unregister:
    desc: Remove this instance's dnsmasq fragment + reload (without touching containers)
    cmds:
      - |
        docker run --rm \
          -v "{{.DNSMASQ_FRAGMENTS_VOLUME}}:/dst" \
          {{.DNSMASQ_IMAGE}}:{{.IMAGE_TAG}} \
          remove-fragment --name {{.CONFIG}}
      - |
        if docker ps -aq --filter "name=^/{{.DNSMASQ_CONTAINER}}$" | grep -q .; then
          docker restart {{.DNSMASQ_CONTAINER}} >/dev/null
        fi

  ps:
    desc: List containers for the named instance
    cmds:
      - docker ps -a --filter "name=^/mailref-{{.CONFIG}}-"

  logs:
    desc: Print available log commands for this mail server instance
    cmds:
      - |
        echo "Tail logs for individual services (CONFIG={{.CONFIG}}):"
        echo "  task postgres:logs CONFIG={{.CONFIG}}"
        echo "  task postfix:logs CONFIG={{.CONFIG}}"
        echo "  task dovecot:logs CONFIG={{.CONFIG}}"
        echo "  task rspamd:logs CONFIG={{.CONFIG}}"
        echo "  task fail2ban:logs CONFIG={{.CONFIG}}"
