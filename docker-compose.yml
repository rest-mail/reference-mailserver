# reference-mailserver — composer for one traditional Postfix+Dovecot mail server.
#
# Parameterization model:
#   CONFIG_DIR points at a directory under ./configs/<name>/. Run twice with
#   different CONFIG_DIR (and different COMPOSE_PROJECT_NAME) to get two
#   independent mail servers (e.g. mail1.test + mail2.test) on the same
#   mailnet network.
#
# Network:
#   `mailnet` is provided by rest-mail/testbed (or any compatible substrate)
#   and joined as external. dnsmasq lives at 10.99.0.10. The shared CA cert
#   bundle and per-host TLS cert/key live on the `certs` volume which is
#   also created and populated by the testbed.
#
# Usage:
#   COMPOSE_PROJECT_NAME=mailref-mail1 CONFIG_DIR=./configs/mail1 \
#     docker compose up -d
#
#   Or use the Taskfile: `task up CONFIG=mail1`.

networks:
  mailnet:
    external: true
    name: ${MAILNET_NAME:-testbed_mailnet}

volumes:
  postgres-data:
  maildir:
  # `certs` is owned by the testbed. Joined here as external so postfix and
  # dovecot can mount the per-host TLS material populated by reference-certgen
  # at testbed boot.
  certs:
    external: true
    name: ${CERTS_VOLUME:-testbed_certs}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${CONFIG_DIR:-./configs/mail1}/env
    volumes:
      - ${CONFIG_DIR:-./configs/mail1}/postgres-init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-mail}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mailnet

  postfix:
    image: ghcr.io/rest-mail/reference-postfix:2026.04.28
    restart: unless-stopped
    hostname: ${POSTFIX_HOSTNAME:-mail1.test}
    env_file:
      - ${CONFIG_DIR:-./configs/mail1}/env
    volumes:
      - ${CONFIG_DIR:-./configs/mail1}/postfix-overlay:/etc/postfix-overlay:ro
      - certs:/certs:ro
    dns:
      - 10.99.0.10
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mailnet

  dovecot:
    image: ghcr.io/rest-mail/reference-dovecot:2026.04.28
    restart: unless-stopped
    hostname: ${DOVECOT_HOSTNAME:-mail1.test}
    env_file:
      - ${CONFIG_DIR:-./configs/mail1}/env
    volumes:
      - ${CONFIG_DIR:-./configs/mail1}/dovecot-overlay:/etc/dovecot-overlay:ro
      - certs:/certs:ro
      - maildir:/var/mail/vhosts
    dns:
      - 10.99.0.10
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mailnet

  rspamd:
    image: ghcr.io/rest-mail/reference-rspamd:2026.04.28
    restart: unless-stopped
    env_file:
      - ${CONFIG_DIR:-./configs/mail1}/env
    volumes:
      - ${CONFIG_DIR:-./configs/mail1}/rspamd-overlay:/etc/rspamd-overlay:ro
    dns:
      - 10.99.0.10
    networks:
      - mailnet

  fail2ban:
    image: ghcr.io/rest-mail/reference-fail2ban:2026.04.28
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - ${CONFIG_DIR:-./configs/mail1}/env
    volumes:
      - ${CONFIG_DIR:-./configs/mail1}/fail2ban-overlay:/etc/fail2ban-overlay:ro
    networks:
      - mailnet
