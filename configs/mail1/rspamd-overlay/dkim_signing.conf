# DKIM signing for outbound mail.
#
# The keypair itself is provisioned at runtime by `task dkim:provision
# CONFIG=<name>`, which writes rspamd-overlay/dkim/<domain>.<selector>.key and
# publishes the matching public key to the testbed DNS. This file is the static
# signing POLICY; the key is the runtime secret.
enabled = true;

# Sign mail originating from the local mailnet (RFC1918) and authenticated
# users — i.e. this instance's own outbound / relayed mail.
sign_local = true;
sign_authenticated = true;

# Test topology: sign despite header/envelope/username mismatches rather than
# silently skipping.
allow_hdrfrom_mismatch = true;
allow_hdrfrom_mismatch_sign_networks = true;
allow_username_mismatch = true;

use_domain = "header";
selector = "mail";

# The entrypoint copies rspamd-overlay/ into /etc/rspamd/local.d/, so a key at
# rspamd-overlay/dkim/<domain>.mail.key lands at the path below.
path = "/etc/rspamd/local.d/dkim/$domain.$selector.key";
