# Mounted over /etc/resolv.conf in the mail daemons (postfix/dovecot/rspamd)
# so the testbed dnsmasq is their ONLY resolver. This bypasses Docker's
# embedded DNS (127.0.0.11), which otherwise answers ahead of dnsmasq for any
# name matching a container hostname on the network — A-records only, no
# MX/TXT/PTR — breaking the simulated internet (failed MX lookups, multi-IP
# answers for bare domains, container names instead of ptr-records).
# Consequence: container names are NOT resolvable in these daemons; all
# intra-stack wiring in `env` uses static mailnet IPs instead.
# 10.99.0.10 is the testbed DNS contract (see dns.env).
nameserver 10.99.0.10
