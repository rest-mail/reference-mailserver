version: "3"

# reference-mailserver/tasks/postfix — Taskfile
#
# Drives the postfix container via plain `docker run` (no compose).
# Included by the main Taskfile under namespace `postfix`.
#
# Joins the testbed's mailnet network at a static IP so it is reachable
# as the SMTP entry point for this mail instance. No host port publishing
# (mailnet only) so multiple instances can coexist on the same host.
# State for the maildir lives on dovecot, so postfix has no data volume.
#
# Output is friendly by default. Re-run with VERBOSE=1 to see the raw
# docker / shell output (e.g. VERBOSE=1 task postfix:up).

silent: true

vars:
  PROJECT: '{{.PROJECT | default "mailref-mail1"}}'
  NETWORK: '{{.NETWORK | default "testbed_mailnet"}}'
  CERTS_VOLUME: '{{.CERTS_VOLUME | default "testbed_certs"}}'
  DNS_IP: '{{.DNS_IP | default "10.99.0.10"}}'
  IP: '{{.IP | default "10.99.0.11"}}'
  HOSTNAME: '{{.HOSTNAME | default "mail1.test"}}'
  CONFIG_DIR: '{{.CONFIG_DIR | default "./configs/mail1"}}'
  IMAGE_TAG: '{{.IMAGE_TAG | default "2026.04.28"}}'
  IMAGE: '{{.IMAGE | default "ghcr.io/rest-mail/reference-postfix"}}'
  CONTAINER_NAME: '{{.PROJECT}}-postfix'

tasks:

  # ════════════════════════════════════════════════════════
  # up / down / restart
  # ════════════════════════════════════════════════════════

  up:
    desc: Start postfix (recreates container; mailnet only, no host ports)
    cmds:
      - |
        [ -n "${VERBOSE}" ] && OUTPUT=/dev/stdout || OUTPUT=/dev/null
        echo "  starting postfix ({{.CONTAINER_NAME}} @ {{.IP}})"
        docker rm -f {{.CONTAINER_NAME}} >$OUTPUT 2>&1 || true
        docker run -d --name {{.CONTAINER_NAME}} \
          --hostname {{.HOSTNAME}} \
          --restart unless-stopped \
          --network {{.NETWORK}} \
          --ip {{.IP}} \
          --dns {{.DNS_IP}} \
          --env-file {{.CONFIG_DIR}}/env \
          -v {{.CONFIG_DIR}}/postfix-overlay:/etc/postfix-overlay:ro \
          -v {{.CERTS_VOLUME}}:/certs:ro \
          {{.IMAGE}}:{{.IMAGE_TAG}} >$OUTPUT 2>&1

  down:
    desc: Stop and remove postfix
    cmds:
      - |
        [ -n "${VERBOSE}" ] && OUTPUT=/dev/stdout || OUTPUT=/dev/null
        if docker ps -aq --filter "name=^/{{.CONTAINER_NAME}}$" | grep -q .; then
          echo "  stopping {{.CONTAINER_NAME}}"
          docker rm -f {{.CONTAINER_NAME}} >$OUTPUT 2>&1
        else
          echo "  {{.CONTAINER_NAME}} not running"
        fi

  restart:
    desc: Recreate the postfix container
    cmds:
      - task: down
      - task: up

  # ════════════════════════════════════════════════════════
  # Diagnostics
  # ════════════════════════════════════════════════════════

  logs:
    desc: Tail postfix logs
    cmds:
      - docker logs -f --tail=100 {{.CONTAINER_NAME}}
