version: "3"

# reference-mailserver/tasks/rspamd — Taskfile
#
# Drives the rspamd container via plain `docker run` (no compose).
# Included by the main Taskfile under namespace `rspamd`.
#
# Joins the testbed's mailnet network at a static IP so peers can reach it
# by name. No data volume — config is mounted read-only from the host.
#
# Output is friendly by default. Re-run with VERBOSE=1 to see the raw
# docker / shell output (e.g. VERBOSE=1 task rspamd:up).

silent: true

vars:
  PROJECT: '{{.PROJECT | default "mailref-mail1"}}'
  NETWORK: '{{.NETWORK | default "testbed_mailnet"}}'
  DNS_IP: '{{.DNS_IP | default "10.99.0.10"}}'
  IP: '{{.IP | default "10.99.0.13"}}'
  CONFIG_DIR: '{{.CONFIG_DIR | default "./configs/mail1"}}'
  IMAGE_TAG: '{{.IMAGE_TAG | default "2026.04.28"}}'
  IMAGE: '{{.IMAGE | default "ghcr.io/rest-mail/reference-rspamd"}}'
  CONTAINER_NAME: '{{.PROJECT}}-rspamd'

tasks:

  # ════════════════════════════════════════════════════════
  # up / down / restart
  # ════════════════════════════════════════════════════════

  up:
    desc: Start rspamd (recreates container)
    cmds:
      - |
        [ -n "${VERBOSE}" ] && OUTPUT=/dev/stdout || OUTPUT=/dev/null
        echo "  starting rspamd ({{.CONTAINER_NAME}} @ {{.IP}})"
        docker rm -f {{.CONTAINER_NAME}} >$OUTPUT 2>&1 || true
        docker run -d --name {{.CONTAINER_NAME}} \
          --restart unless-stopped \
          --network {{.NETWORK}} \
          --ip {{.IP}} \
          --dns {{.DNS_IP}} \
          --env-file {{.CONFIG_DIR}}/env \
          -v {{.CONFIG_DIR}}/rspamd-overlay:/etc/rspamd-overlay:ro \
          --health-cmd 'rspamc stat >/dev/null 2>&1 || exit 1' \
          --health-interval 30s \
          --health-timeout 5s \
          --health-retries 3 \
          {{.IMAGE}}:{{.IMAGE_TAG}} >$OUTPUT 2>&1

  down:
    desc: Stop and remove rspamd
    cmds:
      - |
        [ -n "${VERBOSE}" ] && OUTPUT=/dev/stdout || OUTPUT=/dev/null
        if docker ps -aq --filter "name=^/{{.CONTAINER_NAME}}$" | grep -q .; then
          echo "  stopping {{.CONTAINER_NAME}}"
          docker rm -f {{.CONTAINER_NAME}} >$OUTPUT 2>&1
        else
          echo "  {{.CONTAINER_NAME}} not running"
        fi

  restart:
    desc: Recreate the rspamd container
    cmds:
      - task: down
      - task: up

  # ════════════════════════════════════════════════════════
  # Diagnostics
  # ════════════════════════════════════════════════════════

  logs:
    desc: Tail rspamd logs
    cmds:
      - docker logs -f --tail=100 {{.CONTAINER_NAME}}
