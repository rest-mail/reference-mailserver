version: "3"

# reference-mailserver/tasks/fail2ban — Taskfile
#
# Drives the fail2ban container via plain `docker run` (no compose).
# Included by the main Taskfile under namespace `fail2ban`.
#
# Joins the testbed's mailnet network at a static IP so peers can reach it
# by name. Reads its configuration overlay from the project's CONFIG_DIR.
#
# Output is friendly by default. Re-run with VERBOSE=1 to see the raw
# docker / shell output (e.g. VERBOSE=1 task fail2ban:up).

silent: true

vars:
  PROJECT: '{{.PROJECT | default "mailref-mail1"}}'
  NETWORK: '{{.NETWORK | default "testbed_mailnet"}}'
  IP: '{{.IP | default "10.99.0.14"}}'
  CONFIG_DIR: '{{.CONFIG_DIR | default "./configs/mail1"}}'
  IMAGE_TAG: '{{.IMAGE_TAG | default "2026.04.28"}}'
  IMAGE: '{{.IMAGE | default "ghcr.io/rest-mail/reference-fail2ban"}}'
  CONTAINER_NAME: '{{.PROJECT}}-fail2ban'

tasks:

  # ════════════════════════════════════════════════════════
  # up / down / restart
  # ════════════════════════════════════════════════════════

  up:
    desc: Start fail2ban (recreates container)
    cmds:
      - |
        [ -n "${VERBOSE}" ] && OUTPUT=/dev/stdout || OUTPUT=/dev/null
        echo "  starting fail2ban ({{.CONTAINER_NAME}} @ {{.IP}})"
        docker rm -f {{.CONTAINER_NAME}} >$OUTPUT 2>&1 || true
        docker run -d --name {{.CONTAINER_NAME}} \
          --restart unless-stopped \
          --network {{.NETWORK}} \
          --ip {{.IP}} \
          --cap-add NET_ADMIN \
          --cap-add NET_RAW \
          --env-file {{.CONFIG_DIR}}/env \
          -v {{.CONFIG_DIR}}/fail2ban-overlay:/etc/fail2ban-overlay:ro \
          {{.IMAGE}}:{{.IMAGE_TAG}} >$OUTPUT 2>&1

  down:
    desc: Stop and remove fail2ban
    cmds:
      - |
        [ -n "${VERBOSE}" ] && OUTPUT=/dev/stdout || OUTPUT=/dev/null
        if docker ps -aq --filter "name=^/{{.CONTAINER_NAME}}$" | grep -q .; then
          echo "  stopping {{.CONTAINER_NAME}}"
          docker rm -f {{.CONTAINER_NAME}} >$OUTPUT 2>&1
        else
          echo "  {{.CONTAINER_NAME}} not running"
        fi

  restart:
    desc: Recreate the fail2ban container
    cmds:
      - task: down
      - task: up

  # ════════════════════════════════════════════════════════
  # Diagnostics
  # ════════════════════════════════════════════════════════

  logs:
    desc: Tail fail2ban logs
    cmds:
      - docker logs -f --tail=100 {{.CONTAINER_NAME}}
